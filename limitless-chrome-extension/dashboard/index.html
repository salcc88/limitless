<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limitless | Dashboard</title>
  <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>Limitless</h1>
    <input type="text" id="domain-entry" placeholder="example.com">
    <button id="add-site">Add New Website</button>

    <ul id="site-list"></ul>

    <label for="peek-time">Sneak Peek Duration:</label>
    <select id="peek-time">
      <option value="0.25">15s</option>
      <option value="0.5">30s</option>
      <option value="1">1min</option>
      <option value="2">2min</option>
    </select>

    <script src="main.js"></script>
  </body>
</html>
